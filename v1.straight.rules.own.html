<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 智能駕駛控制挑戰賽</title>
    <style>
        body {
            font-family: "Microsoft JhengHei", Arial, sans-serif;
            background-color: #f4f6f9;
            margin: 0;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        h1 {
            color: #222;
            margin-bottom: 5px;
            font-size: 24px;
        }
        .container {
            display: flex;
            flex-direction: column;
            gap: 15px;
            max-width: 800px;
            width: 100%;
        }
        .simulator-box, .control-panel {
            background: white;
            border-radius: 12px;
            padding: 15px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.06);
        }
        canvas {
            background-color: #e5e5e5;
            border-radius: 8px;
            width: 100%;
            height: auto;
            display: block;
        }
        .btn {
            background-color: #007bff;
            color: white;
            border: none;
            padding: 12px 20px;
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            flex: 1;
            transition: background 0.2s;
        }
        .btn:hover { background-color: #0056b3; }
        .btn-reset { background-color: #6c757d; }
        .btn-reset:hover { background-color: #545b62; }
        .btn-weather { background-color: #28a745; }
        .btn-weather:hover { background-color: #218838; }
        .btn-apply { 
            background-color: #ff9800; 
            color: white; 
            width: 100%; 
            margin-top: 10px;
            font-size: 18px;
            box-shadow: 0 3px 6px rgba(255,152,0,0.3);
        }
        .btn-apply:hover { background-color: #e65100; }
        
        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #eef2f7;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 10px;
            font-weight: bold;
            font-size: 15px;
        }
        .rule-section {
            border: 1px solid #dee2e6;
            padding: 15px;
            border-radius: 10px;
            background: #fdfdfd;
        }
        .rule-title {
            font-size: 18px;
            font-weight: bold;
            color: #333;
            margin-bottom: 12px;
            border-bottom: 3px solid #007bff;
            padding-bottom: 5px;
        }
        .rule-item {
            margin-bottom: 12px;
            font-size: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px;
            border-radius: 6px;
            background: #f8f9fa;
        }
        .safe-bg { border-left: 5px solid #28a745; }
        .danger-bg { border-left: 5px solid #dc3545; }
        .normal-bg { border-left: 5px solid #ffc107; }

        select {
            padding: 6px 10px;
            border-radius: 6px;
            border: 2px solid #ccc;
            font-size: 14px;
            font-weight: bold;
        }
        
        .score-box {
            display: flex;
            justify-content: space-around;
            background: #fff9db;
            border: 1px solid #ffe066;
            padding: 10px;
            border-radius: 8px;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <h1>🚦 AI 交通燈煞車模擬器</h1>
    <p style="color: #666; margin: 0 0 15px 0; font-size: 14px; text-align: center;">黃燈亮起！請幫 AI 小汽車調校出最完美的煞車大腦規則。</p>

    <div class="container">
        <div class="simulator-box">
            <div class="status-bar">
                <div>目前天氣：<span id="txt-weather" style="padding:4px 10px; border-radius:20px; color:white; background-color:#28a745;">☀️ 晴天 (路面乾燥)</span></div>
                <div>測試進度：第 <span id="txt-count" style="color:#007bff; font-size:18px;">0</span> / 10 次</div>
            </div>
            
            <canvas id="simCanvas" width="600" height="220"></canvas>
            
            <div style="margin-top: 12px; display: flex; gap: 8px;">
                <button class="btn" id="btn-start">🚗 開車！出發測試</button>
                <button class="btn btn-weather" id="btn-toggle-weather">🌧️ 變更天氣環境</button>
                <button class="btn btn-reset" id="btn-reset">🔄 分數歸零重來</button>
            </div>
        </div>

        <div class="control-panel">
            <div class="rule-section">
                <div class="rule-title">🧠 設定 AI 小汽車的「大腦規則」</div>
                
                <div class="rule-item normal-bg">
                    <div><b>規則一：</b> 如果車速【<b>慢慢的</b>】 且 距離【<b>很近</b>】</div>
                    <select id="r1-action">
                        <option value="25" selected>🔲 輕踩 25% 煞車</option>
                        <option value="50">🔲 適中 50% 煞車</option>
                        <option value="75">🔲 較重 75% 煞車</option>
                        <option value="100">🔳 踩死 100% 煞車</option>
                    </select>
                </div>

                <div class="rule-item safe-bg">
                    <div><b>規則二：</b> 如果車速【<b>慢慢的</b>】 且 距離【<b>還很遠</b>】</div>
                    <select id="r2-action">
                        <option value="25" selected>🔲 輕踩 25% 煞車</option>
                        <option value="50">🔲 適中 50% 煞車</option>
                        <option value="75">🔲 較重 75% 煞車</option>
                        <option value="100">🔳 踩死 100% 煞車</option>
                    </select>
                </div>

                <div class="rule-item danger-bg">
                    <div><b>規則三：</b> 如果車速【<b>衝得快</b>】 且 距離【<b>超級近</b>】</div>
                    <select id="r3-action">
                        <option value="25" selected>🔲 輕踩 25% 煞車</option>
                        <option value="50">🔲 適中 50% 煞車</option>
                        <option value="75">🔲 較重 75% 煞車</option>
                        <option value="100">🔳 踩死 100% 煞車</option>
                    </select>
                </div>

                <div class="rule-item normal-bg">
                    <div><b>規則四：</b> 如果車速【<b>衝得快</b>】 且 距離【<b>還很遠</b>】</div>
                    <select id="r4-action">
                        <option value="25" selected>🔲 輕踩 25% 煞車</option>
                        <option value="50">🔲 適中 50% 煞車</option>
                        <option value="75">🔲 較重 75% 煞車</option>
                        <option value="100">🔳 踩死 100% 煞車</option>
                    </select>
                </div>

                <button class="btn btn-apply" id="btn-apply-rules">💾 確定！把這套規則傳給 AI 車</button>
            </div>

            <div class="score-box">
                <div style="text-align: center; color: #28a745; font-weight:bold;">🟢 安全停下：<span id="stat-success" style="font-size: 22px;">0</span> 次</div>
                <div style="text-align: center; color: #dc3545; font-weight:bold;">🔴 失敗/撞車：<span id="stat-fail" style="font-size: 22px;">0</span> 次</div>
                <div style="text-align: center; color: #007bff; font-weight:bold;">📊 成功率：<span id="stat-rate" style="font-size: 22px;">0%</span></div>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('simCanvas');
        const ctx = canvas.getContext('2d');

        let testCount = 0, successCount = 0, failCount = 0;
        let carX = 50, carSpeed = 0, isAnimating = false, brakeLevel = "25", animationId;
        let currentSpeedMode = 'low', currentDistanceMode = 'near', weather = 'good';

        const stopZoneMin = 400; 
        const stopZoneMax = 460; 

        let aiRules = { low_near: '25', low_far: '25', fast_near: '25', fast_far: '25' };

        // 🎯 10 次固定測試序列，完美均勻地覆蓋四種規則
        const testStages = [
            { speed: 'low',  dist: 'near' }, // 1
            { speed: 'low',  dist: 'far'  }, // 2 (規則二測試)
            { speed: 'fast', dist: 'near' }, // 3
            { speed: 'fast', dist: 'far'  }, // 4 (規則四 75% 測試點！)
            { speed: 'low',  dist: 'far'  }, // 5 
            { speed: 'low',  dist: 'near' }, // 6
            { speed: 'fast', dist: 'far'  }, // 7
            { speed: 'fast', dist: 'near' }, // 8
            { speed: 'low',  dist: 'far'  }, // 9
            { speed: 'fast', dist: 'far'  }  // 10
        ];

        function drawScene() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = weather === 'good' ? '#808080' : '#4A5056'; 
            ctx.fillRect(0, 130, canvas.width, 50);

            ctx.fillStyle = 'rgba(40, 167, 69, 0.6)'; ctx.fillRect(stopZoneMin, 130, 4, 50);
            ctx.fillStyle = 'rgba(220, 53, 69, 0.6)'; ctx.fillRect(stopZoneMax, 130, 4, 50);
            ctx.fillStyle = 'rgba(40, 167, 69, 0.15)'; ctx.fillRect(stopZoneMin + 4, 130, (stopZoneMax - stopZoneMin - 4), 50);

            ctx.fillStyle = '#333'; ctx.fillRect(500, 40, 24, 60);
            ctx.fillStyle = '#555'; ctx.beginPath(); ctx.arc(512, 52, 7, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = '#ffc107'; ctx.beginPath(); ctx.arc(512, 70, 7, 0, Math.PI*2); ctx.fill(); 
            ctx.fillStyle = '#555'; ctx.beginPath(); ctx.arc(512, 88, 7, 0, Math.PI*2); ctx.fill();
            ctx.fillRect(512, 100, 2, 30);

            if (weather === 'bad') {
                ctx.strokeStyle = 'rgba(174,194,224,0.5)'; ctx.lineWidth = 1;
                for (let i = 0; i < canvas.width; i += 40) {
                    for (let j = 0; j < canvas.height; j += 40) {
                        ctx.beginPath(); ctx.moveTo(i, j); ctx.lineTo(i - 4, j + 15); ctx.stroke();
                    }
                }
            }

            ctx.fillStyle = '#dc3545'; ctx.fillRect(carX, 135, 40, 20);
            ctx.fillStyle = '#333'; 
            ctx.beginPath(); ctx.arc(carX+10, 157, 5, 0, Math.PI*2); ctx.fill();
            ctx.beginPath(); ctx.arc(carX+30, 157, 5, 0, Math.PI*2); ctx.fill();
            
            ctx.fillStyle = '#000'; ctx.font = 'bold 14px "Microsoft JhengHei"';
            let speedTxt = currentSpeedMode === 'low' ? '慢慢的' : '衝得快';
            let distTxt = currentDistanceMode === 'near' ? '很近' : '還很遠';
            ctx.fillText(`目前狀況: 車速【${speedTxt}】＋ 距離【${distTxt}】`, 20, 30);
            ctx.fillText(`AI 採用的煞車大腦指令：【${brakeLevel}%】`, 20, 55);
        }

        function updateRulesFromUI() {
            aiRules.low_near = document.getElementById('r1-action').value;
            aiRules.low_far = document.getElementById('r2-action').value;
            aiRules.fast_near = document.getElementById('r3-action').value;
            aiRules.fast_far = document.getElementById('r4-action').value;
            alert("👍 傳送成功！AI 小汽車已經換上你修改的大腦規則了。");
        }

        function initExperiment() {
            if (isAnimating) return;
            
            let stageIndex = testCount % 10;
            let currentStage = testStages[stageIndex];

            currentSpeedMode = currentStage.speed;
            currentDistanceMode = currentStage.dist;

            const ruleKey = `${currentSpeedMode}_${currentDistanceMode}`;
            brakeLevel = aiRules[ruleKey];

            let targetStopFront = 430;
            let targetStopX = targetStopFront - 40; 
            
            let percent = parseFloat(brakeLevel);
            let baseDecel = 0.1;
            let decel = (percent / 100) * baseDecel;
            if (weather === 'bad') decel = decel * 0.5;

            // 🎯 重新設計具有完美物理對應的車速矩陣
            let requiredSpeed = 3.0;
            if (currentSpeedMode === 'low' && currentDistanceMode === 'near') requiredSpeed = 2.0;
            if (currentSpeedMode === 'low' && currentDistanceMode === 'far') requiredSpeed = 1.4142; 
            if (currentSpeedMode === 'fast' && currentDistanceMode === 'near') requiredSpeed = 4.0;
            if (currentSpeedMode === 'fast' && currentDistanceMode === 'far') requiredSpeed = 3.873; // 🎯 讓 75% 成為晴天完美解答的魔術速度！

            carSpeed = requiredSpeed;
            
            // 🎯 對齊我們最新的標準答案庫
            let correctPercent = 50;
            if (currentSpeedMode === 'low' && currentDistanceMode === 'near') correctPercent = (weather === 'good') ? 50 : 100;
            if (currentSpeedMode === 'low' && currentDistanceMode === 'far') correctPercent = (weather === 'good') ? 25 : 50;
            if (currentSpeedMode === 'fast' && currentDistanceMode === 'near') correctPercent = 100;
            if (currentSpeedMode === 'fast' && currentDistanceMode === 'far') correctPercent = (weather === 'good') ? 75 : 100; // 🎯 規則四晴天 = 75%！

            let correctDecel = (correctPercent / 100) * baseDecel;
            if (weather === 'bad') correctDecel = correctDecel * 0.5;

            let correctDistance = (requiredSpeed * requiredSpeed) / (2 * correctDecel);
            carX = targetStopX - correctDistance;

            isAnimating = true;
            runSimulation();
        }

        function runSimulation() {
            let percent = parseFloat(brakeLevel);
            let baseDecel = 0.1;
            let deceleration = (percent / 100) * baseDecel; 

            if (weather === 'bad') { 
                deceleration = deceleration * 0.5; 
            }

            carSpeed -= deceleration;
            if (carSpeed < 0) carSpeed = 0;
            carX += carSpeed;

            drawScene();

            if (carSpeed === 0 || carX > canvas.width) {
                isAnimating = false;
                cancelAnimationFrame(animationId);
                evaluateResult();
            } else {
                animationId = requestAnimationFrame(runSimulation);
            }
        }

        function evaluateResult() {
            testCount++;
            let carFront = carX + 40; 
            let isSafeStop = (carFront >= stopZoneMin && carFront <= stopZoneMax);

            if (isSafeStop) {
                successCount++;
                alert(`🎯 第 ${testCount} 次測試：【安全過關！】\n現狀：車速【${currentSpeedMode==='low'?'慢慢的':'衝得快'}】＋ 距離【${currentDistanceMode==='near'?'很近':'還很遠'}】\nAI 大腦指令：${brakeLevel}% 煞車。\n汽車滑行姿態完美，順利停在路口安全區！`);
            } else {
                failCount++;
                if (carFront < stopZoneMin) {
                    alert(`第 ${testCount} 次測試：【失敗】\n❌ 原因：煞車踩太重了 (${brakeLevel}%)！\n小汽車還沒到達路口就提早停在半路了。想一想，需要減少一點百分比嗎？`);
                } else {
                    alert(`第 ${testCount} 次測試：【失敗】\n💥 原因：煞車踩太輕了 (${brakeLevel}%)！\n小汽車完全煞不住，直接衝過黃線了！想一想，需要增加一點百分比嗎？`);
                }
            }

            document.getElementById('txt-count').innerText = testCount;
            document.getElementById('stat-success').innerText = successCount;
            document.getElementById('stat-fail').innerText = failCount;
            document.getElementById('stat-rate').innerText = Math.round((successCount / testCount) * 100) + '%';
        }

        document.getElementById('btn-toggle-weather').addEventListener('click', () => {
            if (weather === 'good') {
                weather = 'bad';
                document.getElementById('txt-weather').innerText = "🌧️ 雨天 (路面超級滑)";
                document.getElementById('txt-weather').style.backgroundColor = "#dc3545";
            } else {
                weather = 'good';
                document.getElementById('txt-weather').innerText = "☀️ 晴天 (路面乾燥)";
                document.getElementById('txt-weather').style.backgroundColor = "#28a745";
            }
            drawScene();
        });

        document.getElementById('btn-start').addEventListener('click', initExperiment);

        document.getElementById('btn-reset').addEventListener('click', () => {
            testCount = 0; successCount = 0; failCount = 0; carX = 50; carSpeed = 0; isAnimating = false;
            weather = 'good';
            cancelAnimationFrame(animationId);
            document.getElementById('txt-count').innerText = "0";
            document.getElementById('stat-success').innerText = "0";
            document.getElementById('stat-fail').innerText = "0";
            document.getElementById('stat-rate').innerText = "0%";
            document.getElementById('txt-weather').innerText = "☀️ 晴天 (路面乾燥)";
            document.getElementById('txt-weather').style.backgroundColor = "#28a745";
            drawScene();
        });

        document.getElementById('btn-apply-rules').addEventListener('click', updateRulesFromUI);
        drawScene();
    </script>
</body>
</html>
